events {}

http {
  upstream sha_backend {
    server backend-a:8010;
    server backend-b:8010;
  }

  upstream sha_frontend {
    server frontend:3010;
  }

  server {
    listen 8080;

    location /api/ {
      proxy_pass http://sha_backend;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /health {
      proxy_pass http://sha_backend;
      proxy_set_header Host $host;
    }

    location / {
      proxy_pass http://sha_frontend;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
