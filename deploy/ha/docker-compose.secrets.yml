services:
  postgres:
    environment:
      POSTGRES_PASSWORD: ""
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password

  backend-a: &backend-secrets
    environment:
      SHA_DATABASE_URL: ""
      SHA_DATABASE_URL_FILE: /run/secrets/sha_database_url
      SHA_API_TOKEN: ""
      SHA_API_TOKEN_FILE: /run/secrets/sha_api_token
      SHA_READONLY_API_TOKEN: ""
      SHA_READONLY_API_TOKEN_FILE: /run/secrets/sha_readonly_api_token
      SHA_AGENT_API_TOKEN: ""
      SHA_AGENT_API_TOKEN_FILE: /run/secrets/sha_agent_api_token
      SHA_EXTERNAL_AUTH_TRUSTED_TOKEN: ""
      SHA_EXTERNAL_AUTH_TRUSTED_TOKEN_FILE: /run/secrets/sha_external_auth_trusted_token
    secrets:
      - sha_database_url
      - sha_api_token
      - sha_readonly_api_token
      - sha_agent_api_token
      - sha_external_auth_trusted_token

  backend-b: *backend-secrets

  frontend:
    environment:
      NEXT_PUBLIC_SHA_API_TOKEN: ""

secrets:
  postgres_password:
    file: ${POSTGRES_PASSWORD_SECRET_FILE:?set POSTGRES_PASSWORD_SECRET_FILE}
  sha_database_url:
    file: ${SHA_DATABASE_URL_SECRET_FILE:?set SHA_DATABASE_URL_SECRET_FILE}
  sha_api_token:
    file: ${SHA_API_TOKEN_SECRET_FILE:?set SHA_API_TOKEN_SECRET_FILE}
  sha_readonly_api_token:
    file: ${SHA_READONLY_API_TOKEN_SECRET_FILE:?set SHA_READONLY_API_TOKEN_SECRET_FILE}
  sha_agent_api_token:
    file: ${SHA_AGENT_API_TOKEN_SECRET_FILE:?set SHA_AGENT_API_TOKEN_SECRET_FILE}
  sha_external_auth_trusted_token:
    file: ${SHA_EXTERNAL_AUTH_TRUSTED_TOKEN_SECRET_FILE:?set SHA_EXTERNAL_AUTH_TRUSTED_TOKEN_SECRET_FILE}
